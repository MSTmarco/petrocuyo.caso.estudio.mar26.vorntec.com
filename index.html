<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VÖRNTEC — Caso de Estudio Técnico</title>
  <meta name="description" content="Detección Temprana de Fugas de Gas mediante IA en Operación Offshore — VÖRNTEC Technical Case Study"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07070b;overflow-x:hidden}
    html{scroll-behavior:smooth}
    ::selection{background:rgba(0,200,83,0.19);color:#eef0f4}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;


const C = {
  bg:"#07070b", page:"#0c0c12", surface:"#111118", card:"#15151e",
  border:"#1e1e2a", border2:"#282838",
  green:"#00c853", greenDim:"rgba(0,200,83,0.08)",
  blue:"#448aff", blueDim:"rgba(68,138,255,0.08)",
  amber:"#ffab00", amberDim:"rgba(255,171,0,0.08)",
  red:"#ff5252",
  // Improved contrast: bumped text colors significantly
  white:"#eef0f4", text:"#cccde0", dim:"#9a9ab8", muted:"#6e6e8e", faint:"#4a4a66",
  outBg:"#171724", // slightly lighter bg for outputs card
  mono:"'JetBrains Mono','Fira Code','Consolas',monospace",
  sans:"'DM Sans','Inter','Segoe UI',system-ui,sans-serif",
};

const TP = "09";

function F({ children, d = 0 }) {
  const r = useRef(null); const [v, sv] = useState(false);
  useEffect(() => { const o = new IntersectionObserver(([e]) => e.isIntersecting && sv(true), { threshold: 0.06 }); r.current && o.observe(r.current); return () => o.disconnect(); }, []);
  return <div ref={r} style={{ opacity:v?1:0, transform:v?"none":"translateY(16px)", transition:`opacity .55s ease ${d}ms, transform .55s ease ${d}ms` }}>{children}</div>;
}

function Num({ value, prefix="", suffix="", ms=1600 }) {
  const [d, sd] = useState(0); const r = useRef(null), go = useRef(false);
  useEffect(() => { const o = new IntersectionObserver(([e]) => { if (e.isIntersecting && !go.current) { go.current = true; const s = performance.now(); const f = n => { const p = Math.min((n-s)/ms,1); sd((1-Math.pow(1-p,3))*value); p<1 && requestAnimationFrame(f); }; requestAnimationFrame(f); } }, { threshold:.3 }); r.current && o.observe(r.current); return () => o.disconnect(); }, [value, ms]);
  return <span ref={r}>{prefix}{Math.round(d).toLocaleString("en-US")}{suffix}</span>;
}

function Sev({ l }) {
  const m = { Crit:C.red, High:C.amber, Med:C.blue, Low:C.muted }; const c = m[l]||C.muted;
  return <span style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, letterSpacing:".06em", padding:"2px 8px", borderRadius:3, color:c, background:c+"16", border:`1px solid ${c}25` }}>{l}</span>;
}

function KV({ k, v, mono=false }) {
  return <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
    <span style={{ fontSize:13, color:C.dim }}>{k}</span>
    <span style={{ fontSize:13, color:C.white, fontWeight:600, fontFamily:mono?C.mono:C.sans }}>{v}</span>
  </div>;
}

function Tag({ children, color=C.green }) {
  return <span style={{ fontSize:10, fontWeight:600, fontFamily:C.mono, letterSpacing:".04em", padding:"2px 9px", borderRadius:3, color, background:color+"12", border:`1px solid ${color}20`, whiteSpace:"nowrap" }}>{children}</span>;
}

function PF({ title, num }) {
  return <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderTop:`1px solid ${C.border}`, paddingTop:14, marginTop:48, fontSize:11, fontFamily:C.mono, color:C.muted }}>
    <span style={{ fontWeight:700, color:C.green, letterSpacing:".08em" }}>VÖRNTEC</span>
    <span>{title}</span>
    <span>{num} / {TP}</span>
  </div>;
}

function SH({ num, title, sub }) {
  return <div style={{ marginBottom:36 }}>
    <div style={{ display:"flex", alignItems:"baseline", gap:14, marginBottom:10 }}>
      <span style={{ fontSize:44, fontWeight:800, fontFamily:C.mono, color:C.green, lineHeight:1, opacity:.22 }}>{num}</span>
      <h2 style={{ fontSize:26, fontWeight:700, color:C.white, margin:0, lineHeight:1.2, letterSpacing:"-.02em" }}>{title}</h2>
    </div>
    {sub && <p style={{ fontSize:14, color:C.dim, margin:0, lineHeight:1.6, maxWidth:620 }}>{sub}</p>}
  </div>;
}

function Page({ children, id }) {
  return <section id={id} style={{ minHeight:"100vh", padding:"64px 24px", display:"flex", justifyContent:"center" }}>
    <div style={{ width:"100%", maxWidth:880 }}>{children}</div>
  </section>;
}

function Logo({ name, w=100, h=32, light=false }) {
  const [status, setStatus] = useState("loading");
  const fallback = name.replace(/[-_]/g," ").replace(/\.\w+$/,"");
  return <div style={{ width:w, height:h, borderRadius:4, overflow:"hidden", position:"relative", display:"flex", alignItems:"center", justifyContent:"center", background: light ? "rgba(255,255,255,0.9)" : "transparent", padding: light ? "3px 6px" : 0 }}>
    {status !== "error" && <img src={"./" + name} alt={fallback} onLoad={() => setStatus("ok")} onError={() => setStatus("error")} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block", opacity: status==="ok" ? 1 : 0, transition:"opacity .3s" }}/>}
    {status === "error" && <span style={{ fontSize:9, fontWeight:700, fontFamily:C.mono, color:C.faint, letterSpacing:".08em", textTransform:"uppercase" }}>{fallback}</span>}
  </div>;
}

function App() {
  const [sec, setSec] = useState(0);
  const ids = ["s1","s2","s3","s4","s5","s6","s7","s8","s9"];

  useEffect(() => {
    const h = () => { const y = window.scrollY + window.innerHeight*.45; ids.forEach((id,i) => { const el = document.getElementById(id); el && y>=el.offsetTop && y<el.offsetTop+el.offsetHeight && setSec(i); }); };
    window.addEventListener("scroll",h); return () => window.removeEventListener("scroll",h);
  }, []);

  const go = i => document.getElementById(ids[i])?.scrollIntoView({ behavior:"smooth" });

  return (
    <div style={{ background:C.bg, color:C.text, fontFamily:C.sans }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
      <style>{`*{box-sizing:border-box;margin:0;padding:0}body{background:${C.bg}}::selection{background:${C.green}30;color:${C.white}}html{scroll-behavior:smooth}`}</style>

      {/* HEADER */}
      <header style={{ position:"sticky", top:0, zIndex:50, borderBottom:`1px solid ${C.border}`, background:C.bg+"e6", backdropFilter:"blur(14px)" }}>
        <div style={{ maxWidth:880, margin:"0 auto", padding:"12px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <Logo name="vorntec-logo.png" w={90} h={28}/>
            <span style={{ width:1, height:16, background:C.border, display:"inline-block" }}/>
            <span style={{ fontSize:11, color:C.dim }}>Caso de Estudio Técnico</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:9, fontWeight:700, fontFamily:C.mono, letterSpacing:".1em", color:C.muted, padding:"2px 8px", border:`1px solid ${C.border}`, borderRadius:3 }}>CONFIDENCIAL</span>
            <Logo name="pampa.png" w={72} h={24} light/>
          </div>
        </div>
      </header>

      {/* NAV */}
      <nav style={{ position:"fixed", right:14, top:"50%", transform:"translateY(-50%)", display:"flex", flexDirection:"column", gap:5, zIndex:100 }}>
        {ids.map((_,i) => <button key={i} onClick={() => go(i)} style={{ width:sec===i?20:7, height:7, borderRadius:4, border:"none", cursor:"pointer", padding:0, background:sec===i?C.green:C.border2, transition:"all .3s" }}/>)}
      </nav>

{/* ═══ 01 — PORTADA ═══ */}
      <Page id="s1">
        <F>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:48 }}>
            <span style={{ fontSize:15, fontWeight:800, fontFamily:C.mono, color:C.green, letterSpacing:".06em" }}>VÖRNTEC</span>
            <span style={{ color:C.faint, fontFamily:C.mono, fontSize:12 }}>—</span>
            <span style={{ fontSize:12, fontFamily:C.mono, color:C.dim }}>Caso de Estudio Técnico</span>
          </div>
        </F>
        <F d={80}>
          <h1 style={{ fontSize:"clamp(28px,4.2vw,46px)", fontWeight:800, color:C.white, lineHeight:1.1, letterSpacing:"-.03em", marginBottom:20 }}>
            Detección Temprana de<br/>
            Fugas de Gas mediante IA<br/>
            <span style={{ color:C.green }}>en Operación Offshore</span>
          </h1>
        </F>
        <F d={160}>
          <p style={{ fontSize:15, color:C.text, lineHeight:1.7, maxWidth:600, marginBottom:40 }}>
            Validación técnica del pipeline de detección de VÖRNTEC aplicado a telemetría SCADA real del Dataset 3W de Petrobras — 32.8M de observaciones, 24 canales de sensores, 9 tipos de fallas confirmadas.
          </p>
        </F>

        <F d={220}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:28 }}>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:22 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.muted, letterSpacing:".1em", marginBottom:14 }}>INPUTS</div>
              {[["Telemetría SCADA","32,872,250 observaciones"],["Canales de sensores","24 señales"],["Tipos de señal","Presión / Temp / Caudal"],["Clases de fallas etiquetadas","9 tipos"]].map(([k,v],i) => <KV key={i} k={k} v={v}/>)}
            </div>
            {/* OUTPUTS — subtly highlighted */}
            <div style={{ background:"#1a1a28", border:`1px solid ${C.green}28`, borderRadius:8, padding:22, boxShadow:`0 0 20px ${C.green}06` }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green, letterSpacing:".1em", marginBottom:14 }}>OUTPUTS</div>
              <div style={{ marginBottom:28 }}>
                <div style={{ fontSize:36, fontWeight:800, fontFamily:C.mono, color:C.green }}><Num value={8} prefix="$" suffix="M/año"/></div>
                <div style={{ fontSize:14, color:C.white, fontWeight:600, marginTop:4 }}>Valor de producción recuperada</div>
              </div>
              <div>
                <div style={{ fontSize:36, fontWeight:800, fontFamily:C.mono, color:C.blue }}><Num value={146} suffix="t CH₄"/></div>
                <div style={{ fontSize:14, color:C.white, fontWeight:600, marginTop:4 }}>Emisiones de metano evitadas por año</div>
              </div>
            </div>
          </div>
        </F>

        {/* Benefits for Pampa — below inputs/outputs */}
        <F d={320}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:1, background:C.border, borderRadius:8, overflow:"hidden" }}>
            {[
              { icon:"⚡", title:"Eficiencia Operacional", desc:"Detección proactiva de fallas que causan pérdidas de producción no visibles para los sistemas de alarma convencionales." },
              { icon:"🛡", title:"Seguridad", desc:"Identificación temprana de condiciones de riesgo como cierres espurios de DHSV y slugging severo antes de que escalen." },
              { icon:"🌿", title:"Impacto Ambiental", desc:"Reducción de emisiones de metano mediante detección anticipada de fugas de gas y bloqueos que requieren blowdown." },
            ].map((b,i) =>
              <div key={i} style={{ background:C.surface, padding:"20px 18px" }}>
                <div style={{ fontSize:20, marginBottom:8 }}>{b.icon}</div>
                <div style={{ fontSize:13, fontWeight:700, color:C.white, marginBottom:4 }}>{b.title}</div>
                <div style={{ fontSize:12, color:C.dim, lineHeight:1.55 }}>{b.desc}</div>
              </div>
            )}
          </div>
        </F>
        <F d={400}><div style={{ fontSize:11, color:C.muted, marginTop:28 }}>vorntec.com<br/>Confidencial — uso exclusivo para inversores y clientes</div></F>
        <PF title="Resumen Ejecutivo" num="01"/>
      </Page>

{/* ═══ 02 — EL DATASET ═══ */}
      <Page id="s2">
        <SH num="02" title="El Dataset" sub="Origen, composición y credibilidad"/>
        <F>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:24, marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:20, marginBottom:16 }}>
              <Logo name="petrobras.png" w={120} h={48} light/>
              <div>
                <h3 style={{ fontSize:16, fontWeight:700, color:C.white, margin:"0 0 10px" }}>Origen: Dataset 3W — Petrobras</h3>
                <p style={{ fontSize:13, color:C.text, lineHeight:1.7, margin:0 }}>
                  El dataset proviene de telemetría SCADA real registrada en múltiples pozos offshore operados por una compañía de producción major. Los datos fueron capturados a intervalos de un minuto a través de 24 canales de sensores, abarcando operaciones normales y nueve categorías de fallas confirmadas. Los identificadores de pozos están completamente anonimizados.
                </p>
              </div>
            </div>
            {/* Shorter, non-highlighted disclaimer */}
            <p style={{ fontSize:11, color:C.muted, margin:0, lineHeight:1.6 }}>
              Datos de acceso público (3W Dataset v2.0.0, CC BY 4.0). No existe relación comercial ni contractual entre VÖRNTEC y Petrobras. Dataset utilizado exclusivamente como benchmark técnico.
            </p>
          </div>
        </F>
        <F d={80}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:28 }}>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:22 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.muted, letterSpacing:".1em", marginBottom:14 }}>COMPOSICIÓN</div>
              {[["Total de observaciones","32,872,250"],["Filas normales (Clase 0)","12,158,183"],["Filas anómalas (Clases 1–9)","20,714,067"],["Canales de sensores","24"],["Intervalo de muestreo","1 minuto"],["Tipos de fallas etiquetadas","9"],["Instancias reales etiquetadas","1,119"],["Instancias simuladas","1,089 — excluidas"]].map(([k,v],i) => <KV key={i} k={k} v={v} mono/>)}
            </div>
            <div>
              <div style={{ background:C.greenDim, border:`1px solid ${C.green}18`, borderRadius:8, padding:22, marginBottom:16 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green, letterSpacing:".1em", marginBottom:10 }}>HALLAZGO CLAVE</div>
                <p style={{ fontSize:18, fontWeight:700, color:C.white, margin:"0 0 8px", lineHeight:1.35 }}>El 63% del tiempo monitoreado corresponde a una condición de falla activa.</p>
                <p style={{ fontSize:12, color:C.text, margin:0, lineHeight:1.65 }}>El análisis revela que la proporción de tiempo en estado anómalo supera ampliamente al tiempo en operación normal. Estas fallas se desarrollan de forma progresiva y sub-umbral, sin generar activaciones en los sistemas de alarma convencionales basados en umbrales fijos — lo que evidencia una limitación estructural en los esquemas de monitoreo tradicionales.</p>
              </div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
                <div style={{ fontSize:10, color:C.muted, marginBottom:8 }}>Distribución por conteo de observaciones</div>
                <div style={{ display:"flex", borderRadius:4, overflow:"hidden", height:28 }}>
                  <div style={{ width:"37%", background:C.green+"28", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green }}>37.0%</div>
                  <div style={{ width:"63%", background:C.red+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.red }}>63.0%</div>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:6, fontSize:10, color:C.dim }}>
                  <span>Operación Normal (Clase 0)</span><span>Todas las Fallas (1–9)</span>
                </div>
              </div>
              <div style={{ marginTop:12, padding:"10px 14px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:6 }}>
                <p style={{ fontSize:11, color:C.muted, margin:0, lineHeight:1.6 }}><strong style={{ color:C.dim }}>Nota sobre desbalance de clases:</strong> Ratio extremo — hasta 1:500 entre la clase más rara y la más frecuente. Abordado mediante conjuntos de evaluación balanceados. Entrenamiento con datos normales exclusivamente para la capa no supervisada.</p>
              </div>
            </div>
          </div>
        </F>
        <PF title="Resumen del Dataset" num="02"/>
      </Page>

{/* ═══ 03 — TIPOS DE DATOS Y EQUIPAMIENTO ═══ */}
      <Page id="s3">
        <SH num="03" title="Tipos de Datos y Equipamiento" sub="Las 24 señales monitoreadas y su contexto físico"/>
        <F>
          <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:14 }}>Sensores de Proceso Físico</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:28 }}>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.blue, letterSpacing:".1em", marginBottom:12 }}>PRESIÓN — 10 CANALES</div>
              {[["P-PDG","Permanent Downhole Gauge"],["P-TPT","Tubing Pressure Transducer"],["P-MON-CKP","Upstream — choke de producción"],["P-JUS-CKP","Downstream — choke de producción"],["P-MON-CKGL","Upstream — choke de gas-lift"],["P-JUS-CKGL","Downstream — choke de gas-lift"],["P-ANULAR","Presión anular"],["P-MON-SDV-P","Upstream — SDV de producción"],["PT-P","Válvula wing de producción"],["P-JUS-BS","Downstream — bomba de servicio"]].map(([c,d],i) =>
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                  <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.blue }}>{c}</code>
                  <span style={{ fontSize:11, color:C.dim, textAlign:"right" }}>{d}</span>
                </div>
              )}
            </div>
            <div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18, marginBottom:12 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.amber, letterSpacing:".1em", marginBottom:12 }}>TEMPERATURA — 4 CANALES</div>
                {[["T-PDG","Downhole Gauge"],["T-TPT","Tubing Pressure Transducer"],["T-MON-CKP","Upstream — choke de producción"],["T-JUS-CKP","Downstream — choke de producción"]].map(([c,d],i) =>
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                    <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.amber }}>{c}</code>
                    <span style={{ fontSize:11, color:C.dim }}>{d}</span>
                  </div>
                )}
              </div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green, letterSpacing:".1em", marginBottom:12 }}>CAUDAL — 2 CANALES</div>
                {[["QGL","Inyección de gas-lift [m³/s]"],["QBS","Caudal de bomba de servicio [m³/s]"]].map(([c,d],i) =>
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                    <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.green }}>{c}</code>
                    <span style={{ fontSize:11, color:C.dim }}>{d}</span>
                  </div>
                )}
              </div>
            </div>
          </div>
        </F>
        <F d={80}>
          <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:14 }}>Estados de Válvulas y Actuadores</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:28 }}>
            {[
              { h:"VÁLVULAS DE SEGURIDAD — 3", items:[["ESTADO-DHSV","Downhole Safety Valve","Cierre no programado → shutdown completo + fuga de gas"],["ESTADO-SDV-P","Production Shutdown Valve","Aísla la línea de flujo de producción"],["ESTADO-SDV-GL","Gas-Lift Shutdown Valve","Corta la línea de inyección de gas"]] },
              { h:"ÁRBOL DE POZO — 4", items:[["ESTADO-M1","Production Master Valve (PMV)","Aislación primaria de producción"],["ESTADO-M2","Annulus Master Valve (AMV)","Aislación de línea anular"],["ESTADO-W1","Production Wing Valve (PWV)","Rama de producción del árbol"],["ESTADO-W2","Annulus Wing Valve (AWV)","Rama anular del árbol"]] },
              { h:"APERTURAS DE CHOKE — 2 / CROSSOVER — 2", items:[["ABER-CKP","Production Choke [% abierto]","Control de flujo primario — variable clave de régimen"],["ABER-CKGL","Gas-Lift Choke [% abierto]","Controla el volumen de inyección de gas"],["ESTADO-PXO","Pig Crossover Valve","Operaciones de pigging"],["ESTADO-XO","Crossover Valve","Configuración de ruteo de líneas"]] },
            ].map((g,gi) =>
              <div key={gi} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:16 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.dim, letterSpacing:".06em", marginBottom:10 }}>{g.h}</div>
                {g.items.map(([code,name,desc],i) =>
                  <div key={i} style={{ marginBottom:8, paddingBottom:8, borderBottom:i<g.items.length-1?`1px solid ${C.border}`:"none" }}>
                    <code style={{ fontSize:10, fontFamily:C.mono, fontWeight:700, color:C.green }}>{code}</code>
                    <div style={{ fontSize:12, fontWeight:600, color:C.text, marginTop:2 }}>{name}</div>
                    <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{desc}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        </F>
        <F d={160}>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:22 }}>

          {
            q: "¿Cómo tienen que venir los datos?",
            a: "Series temporales en formato tabular (CSV, Parquet o exportación directa del historian SCADA). Cada fila = timestamp + lecturas de sensores. No necesitan estar limpios — nuestro pipeline maneja NaN, congelamiento de señales y gaps temporales de forma nativa. Mínimo requerido: timestamp + presión + temperatura + caudal.",
            color: C.blue
          },
          {
            q: "¿Qué tanta información de la operación necesitan?",

            color: C.green
          },
          {
            q: "¿Qué tan grande es la operación analizada?",
            a: "32.8M de observaciones a intervalos de 1 minuto, 24 canales de sensores, 1,119 instancias reales etiquetadas, 9 tipos de fallas confirmadas. Es una de las bases de datos públicas más completas y citadas (100+ publicaciones académicas) para detección de anomalías en producción de petróleo y gas.",
            color: C.blue
          },
          {
            q: "¿Qué tanto necesitan saber de la operación de Pampa para correr los algoritmos?",
            a: "Muy poco al inicio. La Capa 1 (detección) es no supervisada — aprende qué es 'normal' directamente de los datos. Lo primero que hacemos es un pre-análisis automático que identifica qué sensores reaccionan ante cada tipo de anomalía. Lo que sí necesitamos es que un experto valide los hallazgos: cuando el sistema detecta algo, el SME confirma si es real. Esa retroalimentación mejora la clasificación progresivamente.",
            color: C.amber
          },
          {
            q: "¿Cómo y quién clasificó los tipos de fallas?",
            a: "Clasificadas por ingenieros de operaciones y expertos en integridad de pozos de Petrobras, basándose en reportes de incidentes confirmados. Taxonomía documentada en publicaciones peer-reviewed (Journal of Petroleum Science and Engineering, 2019). Para Pampa, la clasificación se construiría en conjunto con su equipo técnico a partir de sus propios registros.",
